# This workflow will do a clean install of node dependencies, cache/restore them, run tests across different versions of node
# then build the application and upload the artifacts

name: Build vite and deploy to pages

on:
  push: 
    branches:
      - main
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: package-lock.json
    - name: npm install, build
      run: |
        npm ci
        npm run test --if-present
        npm run lint --if-present
        npm run build --if-present
    - name: Upload artifact for deploy
      uses: actions/upload-artifact@v7
      with:
        name: production
        path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: production
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

